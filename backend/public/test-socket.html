<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>DreamTeam — Автоматический тест полного цикла</title>
    <style>
        body { font-family: monospace; background: #1e1e2f; color: #eee; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: #2d2d3a; border-radius: 24px; padding: 20px; }
        button { background: #F17BAB; border: none; color: white; padding: 8px 16px; border-radius: 40px; cursor: pointer; }
        pre { background: #1e1e2a; padding: 12px; border-radius: 16px; overflow-x: auto; }
        .log { background: #1e1e2a; padding: 12px; border-radius: 16px; max-height: 300px; overflow-y: auto; font-size: 12px; }
        .flex { display: flex; gap: 12px; align-items: center; margin: 12px 0; }
        input { background: #3d3d4f; border: none; padding: 8px; border-radius: 40px; color: white; }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
<div class="container">
    <h2>🤖 Автоматический тест игры</h2>
    <div class="flex">
        <label>Количество игроков (включая создателя):</label>
        <input type="number" id="playersCount" min="2" max="6" value="3">
        <button id="startAutoTest">🚀 Запустить автоматический тест</button>
    </div>
    <div class="log" id="log"></div>
    <pre id="finalResult"></pre>
</div>

<script>
    let socket = null;
    let currentRoomCode = null;
    let players = [];
    let testActive = false;
    let logDiv, finalPre;

    function addLog(msg) {
        if (!logDiv) return;
        const p = document.createElement('div');
        p.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        logDiv.appendChild(p);
        logDiv.scrollTop = logDiv.scrollHeight;
        console.log(msg);
    }

    // ---- Для ботов: запрос с ручной установкой куки ----
    async function apiRequestWithCookie(url, method, body, cookie) {
        const headers = { 'Content-Type': 'application/json' };
        if (cookie) headers['Cookie'] = cookie;
        const response = await fetch(url, {
            method,
            headers,
            body: body ? JSON.stringify(body) : undefined,
            credentials: 'omit'
        });
        const contentType = response.headers.get('content-type');
        let data = null;
        if (contentType && contentType.includes('application/json')) data = await response.json();
        else data = await response.text();
        if (!response.ok) throw new Error(`HTTP ${response.status}: ${JSON.stringify(data)}`);
        return { data, headers: response.headers };
    }

    // ---- Для создателя: обычный fetch с credentials: 'include' ----
    async function apiRequestAsCreator(url, method, body) {
        const response = await fetch(url, {
            method,
            headers: { 'Content-Type': 'application/json' },
            body: body ? JSON.stringify(body) : undefined,
            credentials: 'include'
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || `HTTP ${response.status}`);
        return data;
    }

    // ---- Создание комнаты (создатель) ----
    async function createRoomAsCreator(nickname, maxPlayers) {
        return await apiRequestAsCreator('/api/room/create', 'POST', { nickname, maxPlayers, randomEvents: false });
    }

    // ---- Присоединение бота (возвращает куки и данные) ----
    async function joinRoomAsBot(roomCode, nickname) {
        const res = await fetch('/api/room/join', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ roomCode, nickname }),
            credentials: 'include'
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        const setCookie = res.headers.get('set-cookie');
        let cookie = null;
        if (setCookie) {
            cookie = setCookie.split(';')[0];
        }
        return { ...data, cookie };
    }

    // ---- Получить карты игрока (для бота) ----
    async function getMyCardsForBot(cookie) {
        const { data } = await apiRequestWithCookie('/api/game/my-cards', 'GET', null, cookie);
        return data.hand;
    }

    // ---- Получить карты для создателя ----
    async function getMyCardsForCreator() {
        return await apiRequestAsCreator('/api/game/my-cards', 'GET');
    }

    // ---- Вскрыть карту (бот) ----
    async function revealCardForBot(cookie, catCard) {
        await apiRequestWithCookie('/api/game/reveal-card', 'POST', { cat_card: catCard }, cookie);
    }

    // ---- Вскрыть карту (создатель) ----
    async function revealCardForCreator(catCard) {
        await apiRequestAsCreator('/api/game/reveal-card', 'POST', { cat_card: catCard });
    }

    // ---- Проголосовать (бот) ----
    async function voteForBot(cookie, voteId) {
        await apiRequestWithCookie('/api/game/create', 'POST', { vote_id: voteId }, cookie);
    }

    // ---- Проголосовать (создатель) ----
    async function voteForCreator(voteId) {
        await apiRequestAsCreator('/api/game/create', 'POST', { vote_id: voteId });
    }

    // ---- Старт игры (создатель) ----
    async function startGameAsCreator() {
        await apiRequestAsCreator('/api/game/start', 'POST');
    }

    async function runAutoTest(playersCount) {
        if (testActive) return;
        testActive = true;
        logDiv = document.getElementById('log');
        finalPre = document.getElementById('finalResult');
        logDiv.innerHTML = '';
        finalPre.innerHTML = '';
        addLog('🚀 Запуск автоматического теста...');

        try {
            // 1. Создаём комнату от создателя
            const creatorNick = `AutoCreator_${Date.now()}`;
            addLog(`Создаём комнату от ${creatorNick}`);
            const createData = await createRoomAsCreator(creatorNick, playersCount);
            currentRoomCode = createData.roomId;
            const creator = {
                nickname: createData.nickname,
                uuid: createData.playerId,
                isCreator: true,
                hand: [],
                openCards: [],
                isVoted: false,
                active: true,
                isBot: false
            };
            players = [creator];

            // 2. Добавляем ботов
            for (let i = 1; i < playersCount; i++) {
                const botNick = `Bot_${Date.now()}_${i}`;
                addLog(`Добавляем бота ${botNick}`);
                const joinData = await joinRoomAsBot(currentRoomCode, botNick);
                players.push({
                    nickname: joinData.nickname,
                    uuid: joinData.playerId,
                    cookie: joinData.cookie,
                    isCreator: false,
                    hand: [],
                    openCards: [],
                    isVoted: false,
                    active: true,
                    isBot: true
                });
            }

            addLog(`Все игроки добавлены. Всего: ${players.length}`);

            // 3. Подключаем WebSocket для создателя
            socket = io({ withCredentials: true });
            await new Promise(resolve => socket.on('connect', resolve));
            socket.emit('register', { playerUuid: creator.uuid, roomCode: currentRoomCode });
            addLog('WebSocket создателя подключён');

            let gameStarted = false;
            let gameCompleted = false;
            let roundInProgress = false;
            let currentRoundNumber = 1;

            socket.on('game-start', async () => {
                addLog('🎮 Игра началась! Загружаем карты для всех игроков...');
                gameStarted = true;
                // Загружаем карты для создателя
                const creatorHand = await getMyCardsForCreator();
                creator.hand = creatorHand;
                addLog(`${creator.nickname} получил ${creatorHand.length} карт`);
                // Загружаем карты для ботов
                for (let p of players.filter(p => p.isBot)) {
                    try {
                        const hand = await getMyCardsForBot(p.cookie);
                        p.hand = hand;
                        addLog(`${p.nickname} получил ${hand.length} карт`);
                    } catch (err) {
                        addLog(`Ошибка загрузки карт для ${p.nickname}: ${err.message}`);
                    }
                }
                processGame();
            });

            socket.on('reveal-card', (data) => {
                const player = players.find(p => p.uuid === data.player.uuid);
                if (player) {
                    player.openCards.push(data.openCard);
                    addLog(`${data.player.nickname} вскрыл карту: ${data.openCard.name}`);
                }
            });

            socket.on('complete-round', (data) => {
                addLog(`🔁 Раунд ${data.current_round} завершён. Исключён: ${data.player ? data.player.nickname : 'никто'}`);
                for (let p of players) {
                    p.isVoted = false;
                    if (data.player && p.uuid === data.player.uuid) p.active = false;
                }
                currentRoundNumber = data.current_round;
                roundInProgress = false;
                setTimeout(() => processGame(), 1000);
            });

            socket.on('complete-game', (data) => {
                addLog(`🏆 ИГРА ЗАВЕРШЕНА! Финальная команда:`);
                gameCompleted = true;
                let report = '=== ФИНАЛЬНЫЙ ОТЧЁТ ===\n';
                for (let p of players) {
                    if (p.active) {
                        report += `\n👤 ${p.nickname}\n`;
                        report += `   Открытые карты:\n`;
                        for (let card of p.openCards) {
                            report += `     - ${card.name} (${getTypeName(card.cardType)})\n`;
                        }
                    }
                }
                finalPre.textContent = report;
                testActive = false;
            });

            // Стартуем игру
            addLog('Начинаем игру (от создателя)...');
            await startGameAsCreator();
        } catch (err) {
            addLog(`❌ Ошибка: ${err.message}`);
            testActive = false;
        }

        async function processGame() {
            if (gameCompleted || !gameStarted) return;
            if (roundInProgress) return;
            roundInProgress = true;

            const activePlayers = players.filter(p => p.active);
            if (activePlayers.length === 0) return;

            addLog(`--- Раунд ${currentRoundNumber}: фаза вскрытия карт ---`);
            for (let p of activePlayers) {
                const stillClosed = p.hand.filter(card => !p.openCards.some(oc => oc.id === card.id));
                for (let card of stillClosed) {
                    const cardIndex = p.hand.findIndex(c => c.id === card.id);
                    try {
                        if (p.isBot) {
                            await revealCardForBot(p.cookie, cardIndex + 1);
                        } else {
                            await revealCardForCreator(cardIndex + 1);
                        }
                        addLog(`${p.nickname} вскрыл карту ${card.name}`);
                        await delay(500);
                    } catch (err) {
                        addLog(`Ошибка вскрытия у ${p.nickname}: ${err.message}`);
                    }
                }
            }

            addLog(`Все карты вскрыты. Начинаем голосование...`);

            for (let p of activePlayers) {
                if (p.isVoted) continue;
                const otherActive = activePlayers.filter(other => other.uuid !== p.uuid);
                let voteTarget = 'skip';
                if (otherActive.length > 0 && Math.random() > 0.2) {
                    const randomIndex = Math.floor(Math.random() * otherActive.length);
                    voteTarget = otherActive[randomIndex].uuid;
                }
                try {
                    if (p.isBot) {
                        await voteForBot(p.cookie, voteTarget);
                    } else {
                        await voteForCreator(voteTarget);
                    }
                    addLog(`${p.nickname} проголосовал за ${voteTarget === 'skip' ? 'пропуск' : voteTarget}`);
                    p.isVoted = true;
                    await delay(300);
                } catch (err) {
                    addLog(`Ошибка голосования у ${p.nickname}: ${err.message}`);
                }
            }
            addLog('Голосование завершено, ожидаем завершения раунда...');
        }
    }

    function delay(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }
    function getTypeName(type) {
        const map = {1:'Роль',2:'Стаж',3:'Черта',4:'Soft skill',5:'Особенность',6:'Языки/среды'};
        return map[type] || 'Карта';
    }

    document.getElementById('startAutoTest').onclick = () => {
        const count = parseInt(document.getElementById('playersCount').value);
        if (count < 2 || count > 6) return alert('Количество игроков от 2 до 6');
        runAutoTest(count);
    };
</script>
</body>
</html>
