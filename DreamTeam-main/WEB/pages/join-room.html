<link rel="stylesheet" href="../css/styles/style.css"> <!--потом убрать строку-->
<!-- Верхняя розовая полоса -->
<div class="join-room-header"></div>
<div class="join-room-title">Присоединение к комнате</div>
<div class="join-room-subtitle">Никнейм и Код комнаты</div>

<!-- Поле для ника -->
<div class="join-room-nick-field">
    <div class="join-room-nick-input"></div>
    <div class="join-room-nick-text">РандомНик</div>
</div>

<!-- Поле для кода комнаты -->
<div class="join-room-code-field">
    <input type="text" class="join-room-code-input" placeholder="Введите код комнаты">
</div>

<!-- Кнопка "Подтвердить" -->
<button class="join-room-confirm">
    <div class="join-room-confirm-bg"></div>
    <div class="join-room-confirm-text">Подтвердить</div>
</button>

<!-- Кнопка "Назад" -->
<button class="join-room-back" data-page="main-page">
    <div class="join-room-back-bg"></div>
    <div class="join-room-back-text">Назад</div>
</button>
