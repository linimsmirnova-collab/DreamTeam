<link rel="stylesheet" href="../css/styles/style.css"> <!--потом убрать строку-->
<!-- Верхняя розовая полоса -->
<div class="create-room-header"></div>
<div class="create-room-title">Создание комнаты</div>
<div class="create-room-nickname-label">Никнейм</div>
    
<!-- Поле для ника -->
<div class="create-room-random-nick">
    <div class="random-nick-text">РандомНик</div>
</div>
    
<!-- Чекбокс "Случайные события" -->
<div class="create-room-random-events">
    <div class="checkbox-container">
        <input type="checkbox" class="checkbox" id="randomEvents">
    </div>
    <label for="randomEvents" class="checkbox-label">Случайные события</label>
</div>
    
<!-- Количество игроков -->
<div class="create-room-players-control">
    <button class="minus-btn">-</button>
    <div class="players-count">
        <span>6</span>
    </div>
    <button class="plus-btn">+</button>
</div>
    
<div class="create-room-players">
    <div class="players-label">Количество игроков</div>
</div>

<!-- Кнопка "Подтвердить" -->
<button class="create-room-confirm">
    <div class="confirm-background"></div>
    <div class="confirm-text">Подтвердить</div>
</button>
    
<!-- Кнопка "Назад" с data-page для перехода -->
<button class="create-room-back" data-page="main-page">
    <div class="back-background"></div>
    <div class="back-text">Назад</div>
</button>
