<link rel="stylesheet" href="../css/styles/style.css"> <!--потом убрать строку-->

<!-- Верхняя розовая полоса -->
<div class="profile-header"></div>
<div class="profile-title">Ваши характеристики</div>
<div class="profile-subtitle">Здесь находятся ваши карты характеристик</div>

<!-- Ник пользователя -->
<div class="profile-nick-field">
    <div class="profile-nick-badge"></div>
    <div class="profile-nick-text">МойНик</div>
</div>

<!-- Карточки характеристик (3 ряда по 2 карточки) -->

<!-- Ряд 1: Роль и Черта характера -->
<!-- Карточка "Роль" -->
<div class="profile-card" style="left: 24px; top: 198px;">
    <div class="profile-card-badge"></div>
    <div class="profile-card-label">Роль</div>
    <div class="profile-card-value">Проект-менеджер</div>
</div>

<!-- Карточка "Черта характера" -->
<div class="profile-card" style="left: 198px; top: 198px;">
    <div class="profile-card-badge"></div>
    <div class="profile-card-label">Черта характера</div>
    <div class="profile-card-value">Ленивый</div>
</div>

<!-- Ряд 2: Стаж и Soft skill -->
<!-- Карточка "Стаж" -->
<div class="profile-card" style="left: 25px; top: 335px;">
    <div class="profile-card-badge"></div>
    <div class="profile-card-label">Стаж</div>
    <div class="profile-card-value">3</div>
</div>

<!-- Карточка "Soft skill" -->
<div class="profile-card" style="left: 199px; top: 335px;">
    <div class="profile-card-badge"></div>
    <div class="profile-card-label">Soft skill</div>
    <div class="profile-card-value">Адаптивность</div>
</div>

<!-- Ряд 3: Особенность и Языки и среды -->
<!-- Карточка "Особенность" -->
<div class="profile-card" style="left: 24px; top: 472px;">
    <div class="profile-card-badge"></div>
    <div class="profile-card-label">Особенность</div>
    <div class="profile-card-value">Подогревает рыбу в офисной микроволновке каждую среду</div>
</div>

<!-- Карточка "Языки и среды" -->
<div class="profile-card" style="left: 198px; top: 472px;">
    <div class="profile-card-badge"></div>
    <div class="profile-card-label">Языки и среды</div>
    <div class="profile-card-value">
        C#<br>
        Kotlin<br>
        Figma
    </div>
</div>

<!-- Нижняя розовая панель с иконками -->
<div class="profile-footer"></div>

<!-- Иконки (аватарки) -->
<div class="profile-icon icon-left" style="background: url('../images/kickout.png')"></div>
<div class="profile-icon icon-center" style="background: url('../images/users.png')"></div>
<div class="profile-icon icon-right" style="background: url('../images/me.png')"></div>

<!-- Кнопка "Ваш ход" и таймер -->
<div class="profile-turn">
    <div class="profile-turn-badge"></div>
    <div class="profile-turn-text">Ваш ход</div>
</div>

<div class="profile-timer">
    <div class="profile-timer-badge"></div>
    <div class="profile-timer-text">1:00</div>
</div>

<!-- Модальное окно для вскрытия карточки -->
<div class="card-modal" style="display: none;">
    <div class="card-modal-overlay"></div>
    <div class="card-modal-content">
        <div class="card-modal-question">Вскрыть эту карту?</div>
        <button class="card-modal-yes">Да</button>
    </div>
</div>
