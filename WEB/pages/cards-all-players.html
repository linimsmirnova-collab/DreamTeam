<link rel="stylesheet" href="../css/styles/style.css"> <!--потом убрать строку-->

<!-- Контейнер для карточек всех игроков (динамически заполняется) -->
<div class="players-cards-container"></div>

<!-- Нижняя розовая панель -->
<div class="cards-footer"></div>

<!-- Иконки (аватарки) -->
<div class="cards-icon icon-left" style="background: url('../images/kickout.png')"></div>
<div class="cards-icon icon-center" style="background: url('../images/users.png')"></div>
<div class="cards-icon icon-right" style="background: url('../images/me.png')"></div>

<!-- Модальное окно с описанием проекта -->
<div class="project-overlay" style="display: none;">
    <div class="project-description">Здесь будет более детальное описание проекта и среда разработки</div>
</div>

<!-- Верхняя розовая полоса -->
<div class="cards-header"></div>
<div class="cards-title">Название проекта</div>\

<!-- Блок с вопросом (круг) -->
<div class="group-three">?</div>

<!-- Блок "Количество человек в проекте" -->
<div class="voted-block">
    <div class="voted-badge"></div>
    <div class="voted-count">4</div>
</div>

<!-- Кнопка "Ваш ход" -->
<div class="cards-turn">
    <div class="cards-turn-badge"></div>
    <div class="cards-turn-text">Ваш ход</div>
</div>

<!-- Таймер -->
<div class="cards-timer">
    <div class="cards-timer-badge"></div>
    <div class="cards-timer-text">1:03</div>
</div>
